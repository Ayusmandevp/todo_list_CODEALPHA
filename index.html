<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate To-Do List</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

    <h1>Ultimate To-Do List</h1>

    <div class="top-bar">

        <input
            type="text"
            id="searchInput"
            placeholder="Search tasks..."
            onkeyup="searchTasks()"
        >

        <button onclick="toggleTheme()">
            Toggle Theme
        </button>

    </div>

    <div class="input-section">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter task..."
        >

        <select id="category">

            <option value="Personal">
                Personal
            </option>

            <option value="Study">
                Study
            </option>

            <option value="Work">
                Work
            </option>

        </select>

        <select id="priority">

            <option value="Low">
                Low Priority
            </option>

            <option value="Medium">
                Medium Priority
            </option>

            <option value="High">
                High Priority
            </option>

        </select>

        <input type="date" id="dueDate">

        <button onclick="addTask()">
            Add
        </button>

    </div>

    <p id="error"></p>

    <ul id="taskList"></ul>

</div>

<h3 style="text-align: center; margin: 5vh;">Project Link<a href="https://github.com/Ayusmandevp/todo_list_CODEALPHA" style="color: aqua; text-decoration: none; "> Link</a></h3>

<script src="script.js"></script>

</body>
</html>
